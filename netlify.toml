# ═══════════════════════════════════════════════════════════
#  Netlify — AL-Dawaa Analytics Platform
#  Pre-built deployment: dist/ is committed and deployed directly
#  No build step on Netlify — build locally then push dist/
# ═══════════════════════════════════════════════════════════

[build]
  command = ""
  publish = "dist"

# ── SPA routing: all paths → index.html ──────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
